<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parlor Prediction Demo Calendar</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body class="demo-body" data-page="calendar" data-requires-auth="true">
  <nav class="navbar navbar-expand-lg demo-navbar">
    <div class="container">
      <a class="navbar-brand" href="./dashboard.html">Parlor Prediction</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#demoNav" aria-controls="demoNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="demoNav">
        <ul class="navbar-nav ms-auto me-3">
          <li class="nav-item"><a class="nav-link" href="./dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="./dough.html">Dough Prep</a></li>
          <li class="nav-item"><a class="nav-link active" href="./calendar.html">Calendar</a></li>
        </ul>
        <div class="d-flex flex-wrap gap-2 align-items-center">
          <span class="badge text-bg-light border" data-demo-user>Demo User</span>
          <button class="btn btn-sm btn-outline-accent" data-demo-reset type="button">Reset demo data</button>
          <button class="btn btn-sm btn-accent" data-demo-logout type="button">Log out</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="demo-shell">
    <div class="container">
      <section class="section-title">
        <div>
          <div class="eyebrow">Weekly prep calendar</div>
          <h1 class="h2 mb-1">One screen to explain the week.</h1>
          <p class="muted-copy mb-0" data-calendar-summary></p>
        </div>
        <a class="btn btn-outline-accent" href="./dough.html">Back to Dough Prep</a>
      </section>

      <div class="row g-4" data-calendar-grid></div>

      <p class="page-footer mt-4 mb-0">Static demo only. This weekly board is mock data designed for GitHub Pages and stakeholder review.</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./assets/demo-data.js"></script>
</body>
</html>
