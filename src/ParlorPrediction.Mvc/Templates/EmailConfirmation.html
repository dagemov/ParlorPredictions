<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>{{AppName}} confirmation</title>
</head>
<body style="font-family:Segoe UI,Arial,sans-serif;background:#f8f3ea;color:#1b1917;margin:0;padding:32px;">
    <div style="max-width:640px;margin:0 auto;background:#fffdf9;border:1px solid rgba(27,25,23,.12);border-radius:18px;padding:32px;">
        <p style="margin:0 0 12px;color:#8f3514;font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;">{{AppName}}</p>
        <h1 style="margin:0 0 16px;font-size:28px;">Confirm your email</h1>
        <p style="margin:0 0 16px;">Hi {{UserName}},</p>
        <p style="margin:0 0 24px;">Use the button below to confirm your account and unlock sign-in.</p>
        <p style="margin:0 0 24px;">
            <a href="{{ActionUrl}}" style="display:inline-block;padding:12px 20px;border-radius:999px;background:#c75b2e;color:#fffdf9;text-decoration:none;font-weight:700;">Confirm Email</a>
        </p>
        <p style="margin:0 0 8px;color:#645b57;">If the button does not work, copy this URL into your browser:</p>
        <p style="margin:0 0 24px;word-break:break-word;color:#645b57;">{{ActionUrl}}</p>
        <p style="margin:0;color:#645b57;font-size:13px;">Need help? Reply to {{SupportEmail}}.</p>
        <p style="margin:12px 0 0;color:#645b57;font-size:13px;">&copy; {{CurrentYear}} {{AppName}}</p>
    </div>
</body>
</html>
