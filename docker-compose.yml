services:
  parlor-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: parlor-prediction-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${PARLOR_SQL_SA_PASSWORD}"
    ports:
      - "${PARLOR_SQL_PORT}:1433"
    volumes:
      - parlor_sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P $$MSSQL_SA_PASSWORD -Q \"SELECT 1\" || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  parlor_sqlserver_data:
